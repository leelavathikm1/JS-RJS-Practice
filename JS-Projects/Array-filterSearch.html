<!doctype html>
<html>
  <head>
    <title>Search & Filter</title>
  </head>
  <body>
    <h2>Product Search</h2>

    <input id="searchInput" placeholder="Search by name or category" />

    <select id="categoryFilter">
      <option value="">All Categories</option>
      <option value="electronics">Electronics</option>
      <option value="clothing">Clothing</option>
    </select>

    <div id="results"></div>

    <script>
      const products = [
        { id: 1, name: "Laptop", category: "electronics", price: 50000 },
        { id: 2, name: "Phone", category: "electronics", price: 20000 },
        { id: 3, name: "T-Shirt", category: "clothing", price: 500 },
        { id: 4, name: "Jeans", category: "clothing", price: 1500 },
      ];

      let searchTerm = "";
      let selectedCategory = "";

      const resultsDiv = document.getElementById("results");

      document.getElementById("searchInput").addEventListener("input", (e) => {
        searchTerm = e.target.value.toLowerCase();
        render();
      });

      document
        .getElementById("categoryFilter")
        .addEventListener("change", (e) => {
          selectedCategory = e.target.value;
          render();
        });

      function getFilteredProducts() {
        return products.filter((product) => {
          const matchesSearch =
            product.name.toLowerCase().includes(searchTerm) ||
            product.category.toLowerCase().includes(searchTerm);

          const matchesCategory =
            selectedCategory === "" || product.category === selectedCategory;

          return matchesSearch && matchesCategory;
        });
      }

      function render() {
        const filtered = getFilteredProducts();

        resultsDiv.innerHTML = "";

        if (filtered.length === 0) {
          resultsDiv.innerHTML = "<p>No results found</p>";
          return;
        }

        filtered.forEach((product) => {
          const div = document.createElement("div");
          div.innerHTML = `
        <strong>${product.name}</strong> - ${product.category} - ₹${product.price}
      `;
          resultsDiv.appendChild(div);
        });
      }

      render();
    </script>
  </body>
</html>
