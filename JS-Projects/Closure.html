  <body>
    <ul id="myUl"></ul>
    <script>
      function clickCounter() {
        let count = 0;
        return {
          increment: function () {
            count++;
            return count;
          },
          decrement: function () {
            count--;
            return count;
          },
        };
      }

      const counter = clickCounter();
      console.log(counter.increment());
      console.log(counter.decrement());
      const myUl = document.getElementById("myUl");
      myUl.innerHTML = ` 
      <li>Increment: ${counter.increment()}</li>
      <li>Decrement: ${counter.decrement()}</li>
      `;

      function createClickCounter() {

      }
    </script>
  </body>
