<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./FetchApi.css" />
  </head>
  <body>
    <div class="container">
      <h1>📝 User Management System</h1>

      <div class="success-message" id="successMessage"></div>

      <div class="form-section">
        <form id="userForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input
                type="text"
                id="firstName"
                placeholder="Enter first name"
                required
              />
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input
                type="text"
                id="lastName"
                placeholder="Enter last name"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter email" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter phone number" />
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter city" />
          </div>

          <div class="form-row">
            <button type="button" class="btn-primary" onclick="addUser()">
              Add User
            </button>
            <button type="reset" class="btn-reset">Clear Form</button>
          </div>
        </form>
        <table border="1">
          <thead>
            <tr>
              <th>Email</th>
              <th>Phone</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>City</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="users-section">
        <h2>👥 All Users</h2>
        <div id="usersList">
          <div class="empty-message">
            No users added yet. Add a user to get started!
          </div>
        </div>
      </div>
    </div>

    <script>
      const url = "http://localhost:3000/users";

      async function addUser() {
        const user = {
          fName: document.getElementById("firstName").value,
          lName: document.getElementById("lastName").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          city: document.getElementById("city").value,
        };

        const response = await fetch(url, {
          method: "POST",
          body: JSON.stringify(user),
          headers: {
            "Content-Type": "Application/json",
          },
        });
        const results = response.json();
        // console.log(results);
      }

      let receivedUsers = [];
      async function getUsers() {
        const response = await fetch(url);
        const dispData = response.json();
        console.log(dispData);
        receivedUsers = dispData;

        dispData.forEach((user) => {
          console.log(user);
          
        });
      }
    </script>
  </body>
</html>
